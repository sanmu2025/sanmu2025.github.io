        // --- Helper Functions ---
        const toChineseCurrency = (n) => {
            if (n === 0) return '零元整';
            if (!n) return '';
            const unit = [['元', '萬', '億'], ['', '拾', '佰', '仟']];
            const digit = ['零', '壹', '貳', '參', '肆', '伍', '陸', '柒', '捌', '玖'];
            let num = Math.abs(n);
            let s = '';
            for (let i = 0; i < unit[0].length && num > 0; i++) {
                let p = '';
                for (let j = 0; j < unit[1].length && num > 0; j++) {
                    p = digit[num % 10] + unit[1][j] + p;
                    num = Math.floor(num / 10);
                }
                s = p.replace(/(零.)*零$/, '').replace(/^$/, '零') + unit[0][i] + s;
            }
            return s.replace(/(零.)*零元/, '元').replace(/(零.)+/g, '零').replace(/^整$/, '零元整') + '整';
        };

        const formatDate = (dateStr) => {
            if (!dateStr) return '';
            const d = new Date(dateStr);
            return d.toISOString().split('T')[0];
        };
        
        const addDays = (dateStr, days) => {
             const d = new Date(dateStr);
             d.setDate(d.getDate() + parseInt(days));
             return d.toISOString().split('T')[0];
        };

        const getCurrentMonth = () => {
            const d = new Date();
            return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}`;
        };

        const safeCSV = (str) => {
            const s = (str || '').toString().replace(/"/g, '""');
            if (s.includes(',') || s.includes('\n') || s.includes('"')) {
                return `"${s}"`;
            }
            return s;
        };

        // --- Main Application ---
        function InvoiceSystem() {
            const [records, setRecords] = useState([]);
            const [activeTab, setActiveTab] = useState('invoice_entry'); 
            const [notification, setNotification] = useState(null);
            
            // Product Presets
            const [productPresets, setProductPresets] = useState(Array(10).fill({ name: '', price: '' }));
            
            // Edit Mode State
            const [editingId, setEditingId] = useState(null);
            const [isLocked, setIsLocked] = useState(true); // v2.17 New Lock State
            
            // Partner View State
            const [partnerSearch, setPartnerSearch] = useState('');
            const [selectedPartner, setSelectedPartner] = useState(null);

            // Product View State
            const [productSearch, setProductSearch] = useState('');
            const [selectedProduct, setSelectedProduct] = useState(null);

            // Invoice Entry - Search Partner State
            const [invoicePartnerSearch, setInvoicePartnerSearch] = useState('');
            const [showPartnerSuggestions, setShowPartnerSuggestions] = useState(false);

            // Invoice Form State
            const [invoiceForm, setInvoiceForm] = useState({
                recordType: 'invoice',
                type: 'sales', 
                format: 'triplicate',
                invoiceNumber: '',
                date: formatDate(new Date()),
                invoicePeriod: getCurrentMonth(),
                partyName: '',
                partyId: '',
                amountType: 'inclusive',
                note: '', 
                isStoreTransaction: false,
                items: [{ id: Date.now(), name: '', qty: 1, price: '' }],
                // v2.17 New Payment Structure
                payments: [], // Array of {date, method, amount, note}
                paymentDueDate: '',
                orderDate: '',
                deliveryDate: '',
                sourceMonthlyId: null 
            });

            // Payment Input State (Local to form)
            const [newPayment, setNewPayment] = useState({
                date: formatDate(new Date()),
                method: '現金',
                amount: '',
                note: ''
            });

            // General Form State
            const [generalForm, setGeneralForm] = useState({
                recordType: 'general',
                type: 'income',
                date: formatDate(new Date()),
                title: '', 
                totalAmount: '',
                depositAmount: '',
                overpaymentAmount: '',
                note: ''
            });
            
            // Monthly Entry Form
            const [monthlyForm, setMonthlyForm] = useState({
                recordType: 'monthly_entry',
                type: 'purchase', // 'purchase' (進貨/應付) or 'sales' (銷貨/應收)
                date: formatDate(new Date()),
                supplierName: '',
                amount: '',
                paymentTerms: '30',
                dueDate: '',
                note: ''
            });

            const [filterMonth, setFilterMonth] = useState(getCurrentMonth());
            const [searchTerm, setSearchTerm] = useState('');
            const [filterType, setFilterType] = useState('all');
            const [filterInvoicePeriod, setFilterInvoicePeriod] = useState('');

            const invoicePeriods = useMemo(() => {
                const s = new Set();
                records.forEach(r => {
                    if (r.recordType === 'invoice') {
                        s.add(r.invoicePeriod || (r.date || '').slice(0,7));
                    }
                });
                return Array.from(s).filter(Boolean).sort().reverse();
            }, [records]);

            // --- Init & Persistence ---
            useEffect(() => {
                const savedData = localStorage.getItem('invoice_system_v2_data');
                if (savedData) {
                    try {
                        let parsedData = JSON.parse(savedData);
                        // v2.17 Migration Logic: Convert old paymentStatus/depositAmount to payments array
                        parsedData = parsedData.map(r => {
                            const migratedRecord = {
                                ...r,
                                recordType: r.recordType || 'invoice',
                                orderDate: r.orderDate || '',
                                deliveryDate: r.deliveryDate || '',
                                paymentDueDate: r.paymentDueDate || '',
                                // v2.15 Migration
                                type: r.recordType === 'monthly_entry' && !r.type ? 'purchase' : r.type,
                                // v2.17 Migration: Ensure payments array exists
                                payments: Array.isArray(r.payments) ? r.payments : [] 
                            };

                            // Convert legacy payment data if payments array is empty
                            if (migratedRecord.recordType === 'invoice' && migratedRecord.payments.length === 0) {
                                if (r.paymentStatus === 'paid') {
                                    migratedRecord.payments.push({
                                        date: r.date,
                                        method: '舊制紀錄',
                                        amount: r.totalAmount,
                                        note: '系統自動轉換'
                                    });
                                } else if (r.paymentStatus === 'deposit' && r.depositAmount > 0) {
                                    migratedRecord.payments.push({
                                        date: r.date,
                                        method: '訂金',
                                        amount: r.depositAmount,
                                        note: '系統自動轉換'
                                    });
                                }
                            }
                            return migratedRecord;
                        });
                        setRecords(parsedData);
                    } catch (e) { console.error('Data load error', e); }
                }
                
                const savedPresets = localStorage.getItem('invoice_system_presets');
                if (savedPresets) {
                    try { setProductPresets(JSON.parse(savedPresets)); } catch (e) { console.error('Preset load error', e); }
                }
            }, []);

            useEffect(() => {
                localStorage.setItem('invoice_system_v2_data', JSON.stringify(records));
            }, [records]);

            useEffect(() => {
                localStorage.setItem('invoice_system_presets', JSON.stringify(productPresets));
            }, [productPresets]);

            // --- Auto Calculate Due Date for Monthly Form ---
            useEffect(() => {
                if (monthlyForm.date && monthlyForm.paymentTerms) {
                    setMonthlyForm(prev => ({
                        ...prev,
                        dueDate: addDays(prev.date, prev.paymentTerms)
                    }));
                }
            }, [monthlyForm.date, monthlyForm.paymentTerms]);

            // --- Derived Data ---
            const distinctPartners = useMemo(() => {
                const map = new Map();
                records.forEach(r => {
                    if (r.recordType === 'invoice' && r.partyName && r.partyName.trim()) {
                        const existing = map.get(r.partyName.trim());
                        if (!existing) {
                            map.set(r.partyName.trim(), { name: r.partyName.trim(), id: r.partyId || '' });
                        } else if (!existing.id && r.partyId) {
                            existing.id = r.partyId;
                        }
                    }
                    if (r.recordType === 'monthly_entry' && r.supplierName && r.supplierName.trim()) {
                         const existing = map.get(r.supplierName.trim());
                         if (!existing) {
                            map.set(r.supplierName.trim(), { name: r.supplierName.trim(), id: '' });
                        }
                    }
                });
                return Array.from(map.values());
            }, [records]);

            const filteredPartnerSuggestions = useMemo(() => {
                if (!invoicePartnerSearch) return [];
                const term = invoicePartnerSearch.toLowerCase();
                return distinctPartners.filter(p => 
                    p.name.toLowerCase().includes(term) || (p.id && p.id.includes(term))
                );
            }, [invoicePartnerSearch, distinctPartners]);
            
            const activeMonthlyEntries = useMemo(() => {
                 return records
                    .filter(r => r.recordType === 'monthly_entry')
                    .sort((a,b) => new Date(a.dueDate) - new Date(b.dueDate));
            }, [records]);

            const dailyGeneralStats = useMemo(() => {
                const targetDate = generalForm.date;
                const dailyRecords = records.filter(r => r.recordType === 'general' && r.date === targetDate);
                
                const income = dailyRecords.filter(r => r.type === 'income').reduce((sum, r) => sum + (parseFloat(r.totalAmount)||0), 0);
                const expense = dailyRecords.filter(r => r.type === 'expense').reduce((sum, r) => sum + (parseFloat(r.totalAmount)||0), 0);
                
                return { income, expense, balance: income - expense };
            }, [records, generalForm.date]);

            // v2.17 Update: Calculate paid amount from payments array
            const invoiceCalculated = useMemo(() => {
                const itemsTotal = invoiceForm.items.reduce((sum, item) => {
                    return sum + ((parseFloat(item.qty) || 0) * (parseFloat(item.price) || 0));
                }, 0);

                let salesAmount = 0, taxAmount = 0, totalAmount = 0;

                if (invoiceForm.amountType === 'inclusive') {
                    salesAmount = Math.round(itemsTotal / 1.05);
                    taxAmount = Math.round(itemsTotal - salesAmount); 
                    totalAmount = Math.round(itemsTotal);
                } else {
                    salesAmount = Math.round(itemsTotal);
                    taxAmount = Math.round(itemsTotal * 0.05);
                    totalAmount = salesAmount + taxAmount;
                }
                
                // v2.17 Payment Logic
                const paidAmount = invoiceForm.payments.reduce((sum, p) => sum + (parseFloat(p.amount) || 0), 0);
                const remainingAmount = totalAmount - paidAmount;
                
                let calculatedStatus = 'unpaid';
                if (paidAmount >= totalAmount && totalAmount > 0) calculatedStatus = 'paid';
                else if (paidAmount > 0) calculatedStatus = 'deposit';

                return { salesAmount, taxAmount, totalAmount, paidAmount, remainingAmount, calculatedStatus };
            }, [invoiceForm.items, invoiceForm.amountType, invoiceForm.payments]);

            const lastInvoiceStats = useMemo(() => {
                const salesInvoices = records.filter(r => r.recordType === 'invoice' && r.type === 'sales');
                const sorted = [...salesInvoices].sort((a, b) => {
                     if(a.createdAt && b.createdAt) {
                         return new Date(b.createdAt) - new Date(a.createdAt);
                     }
                     return new Date(b.date) - new Date(a.date);
                });

                const lastTriplicate = sorted.find(r => r.format === 'triplicate');
                const lastDuplicate = sorted.find(r => r.format === 'duplicate');

                return { lastTriplicate, lastDuplicate };
            }, [records]);

            const currentMonthInvoiceStats = useMemo(() => {
                const thisMonthPrefix = new Date().toISOString().slice(0, 7); 
                const relevantInvoices = records.filter(r => 
                    r.recordType === 'invoice' && 
                    r.type === 'sales' && 
                    r.date.startsWith(thisMonthPrefix)
                );
                return {
                    count: relevantInvoices.length,
                    total: relevantInvoices.reduce((sum, r) => sum + r.totalAmount, 0)
                };
            }, [records]);

            // Unpaid Accounts Stats (Modified for v2.17 payments array)
            const unpaidStats = useMemo(() => {
                // Determine remaining for invoices dynamically
                const invoices = records.filter(r => r.recordType === 'invoice');
                
                const invoiceReceivables = invoices
                    .filter(r => r.type === 'sales')
                    .map(r => {
                         const paid = (r.payments || []).reduce((sum, p) => sum + (parseFloat(p.amount) || 0), 0);
                         const remaining = r.totalAmount - paid;
                         return { ...r, remaining, isEstimated: false };
                    })
                    .filter(r => r.remaining > 0); // Only unpaid

                const monthlyReceivables = records.filter(r => r.recordType === 'monthly_entry' && r.type === 'sales').map(r => ({
                    id: r.id,
                    partyName: r.supplierName,
                    paymentDueDate: r.dueDate,
                    invoiceNumber: '(暫估銷貨)',
                    remaining: parseFloat(r.amount) || 0,
                    note: r.note,
                    recordType: 'monthly_entry',
                    isEstimated: true
                }));

                const receivables = [...invoiceReceivables, ...monthlyReceivables].sort((a,b) => new Date(a.paymentDueDate || '9999-12-31') - new Date(b.paymentDueDate || '9999-12-31'));

                const invoicePayables = invoices
                    .filter(r => r.type === 'purchase')
                    .map(r => {
                         const paid = (r.payments || []).reduce((sum, p) => sum + (parseFloat(p.amount) || 0), 0);
                         const remaining = r.totalAmount - paid;
                         return { ...r, remaining, isEstimated: false };
                    })
                    .filter(r => r.remaining > 0);
                
                const monthlyPayables = records.filter(r => r.recordType === 'monthly_entry' && (!r.type || r.type === 'purchase')).map(r => ({
                    id: r.id,
                    partyName: r.supplierName,
                    paymentDueDate: r.dueDate,
                    invoiceNumber: '(暫估進貨)',
                    remaining: parseFloat(r.amount) || 0,
                    note: r.note,
                    recordType: 'monthly_entry',
                    isEstimated: true
                }));

                const payables = [...invoicePayables, ...monthlyPayables].sort((a,b) => new Date(a.paymentDueDate || '9999-12-31') - new Date(b.paymentDueDate || '9999-12-31'));

                const totalReceivable = receivables.reduce((sum, r) => sum + r.remaining, 0);
                const totalPayable = payables.reduce((sum, r) => sum + r.remaining, 0);

                return { receivables, payables, totalReceivable, totalPayable };
            }, [records]);


            const monthlyStats = useMemo(() => {
                const currentMonthRecords = records.filter(r => r.date.startsWith(filterMonth));
                const invoices = currentMonthRecords.filter(r => r.recordType === 'invoice');
                const invSales = invoices.filter(i => i.type === 'sales');
                const invPurchases = invoices.filter(i => i.type === 'purchase');

                const salesTax = invSales.reduce((acc, cur) => acc + (cur.taxAmount || 0), 0);
                const salesTotal = invSales.reduce((acc, cur) => acc + (cur.totalAmount || 0), 0);
                const purchaseTax = invPurchases.reduce((acc, cur) => acc + (cur.taxAmount || 0), 0);
                const purchaseTotal = invPurchases.reduce((acc, cur) => acc + (cur.totalAmount || 0), 0);

                const storeInvoices = invoices.filter(i => i.isStoreTransaction);
                const generalRecords = currentMonthRecords.filter(r => r.recordType === 'general');

                const storeInvIncome = storeInvoices.filter(i => i.type === 'sales').reduce((acc, cur) => acc + cur.totalAmount, 0);
                const generalIncome = generalRecords.filter(g => g.type === 'income').reduce((acc, cur) => acc + (parseInt(cur.totalAmount) || 0), 0);
                
                const storeInvExpense = storeInvoices.filter(i => i.type === 'purchase').reduce((acc, cur) => acc + cur.totalAmount, 0);
                const generalExpense = generalRecords.filter(g => g.type === 'expense').reduce((acc, cur) => acc + (parseInt(cur.totalAmount) || 0), 0);

                return {
                    salesTax, salesTotal,
                    purchaseTax, purchaseTotal,
                    taxBalance: salesTax - purchaseTax,
                    storeIncome: storeInvIncome + generalIncome,
                    storeExpense: storeInvExpense + generalExpense,
                    storeNet: (storeInvIncome + generalIncome) - (storeInvExpense + generalExpense)
                };
            }, [records, filterMonth]);

            const displayedRecords = useMemo(() => {
                return records
                    .filter(r => r.date.startsWith(filterMonth))
                    .filter(r => {
                        if (!filterInvoicePeriod) return true;
                        if (r.recordType !== 'invoice') return true;
                        return (r.invoicePeriod || (r.date || '').slice(0,7)) === filterInvoicePeriod;
                    })
                    .filter(r => {
                        if (filterType === 'invoice') return r.recordType === 'invoice';
                        if (filterType === 'general') return r.recordType === 'general';
                        if (filterType === 'monthly') return r.recordType === 'monthly_entry';
                        if (filterType === 'store_only') {
                            return r.recordType === 'general' || (r.recordType === 'invoice' && r.isStoreTransaction);
                        }
                        return true;
                    })
                    .filter(r => {
                        const term = searchTerm.toLowerCase();
                        if (r.recordType === 'invoice') {
                            return r.invoiceNumber.toLowerCase().includes(term) || 
                                   r.partyName.toLowerCase().includes(term) ||
                                   (r.partyId && r.partyId.includes(term)) ||
                                   (r.note && r.note.toLowerCase().includes(term)) ||
                                   (r.items && r.items.some(i => i.name.toLowerCase().includes(term)));
                        } else if (r.recordType === 'monthly_entry') {
                            return r.supplierName.toLowerCase().includes(term) || 
                                   (r.note && r.note.toLowerCase().includes(term));
                        } else {
                            return r.title.toLowerCase().includes(term) ||
                                   (r.note && r.note.toLowerCase().includes(term));
                        }
                    })
                    .sort((a, b) => new Date(b.date) - new Date(a.date));
            }, [records, filterMonth, searchTerm, filterType]);

            const partnerStats = useMemo(() => {
                const stats = {};
                records.forEach(r => {
                    let name = '', id = '', date = r.date, type = '';
                    
                    if (r.recordType === 'invoice' && r.partyName && r.partyName.trim() !== '') {
                        name = r.partyName.trim();
                        id = r.partyId || '';
                        type = r.type;
                    } else if (r.recordType === 'monthly_entry' && r.supplierName && r.supplierName.trim() !== '') {
                        name = r.supplierName.trim();
                        type = r.type || 'purchase'; 
                    }

                    if (name) {
                        if (!stats[name]) {
                            stats[name] = {
                                name: name,
                                id: id,
                                count: 0,
                                lastDate: date,
                                types: new Set(),
                                records: [] 
                            };
                        }
                        stats[name].count += 1;
                        stats[name].types.add(type);
                        stats[name].records.push({...r, totalAmount: r.totalAmount || (parseFloat(r.amount) || 0) });
                        
                        if (new Date(date) >= new Date(stats[name].lastDate)) {
                             stats[name].lastDate = date;
                             if (id) stats[name].id = id;
                        } else if (!stats[name].id && id) {
                            stats[name].id = id;
                        }
                    }
                });
                return Object.values(stats)
                    .filter(p => p.name.toLowerCase().includes(partnerSearch.toLowerCase()) || p.id.includes(partnerSearch))
                    .sort((a, b) => new Date(b.lastDate) - new Date(a.lastDate));
            }, [records, partnerSearch]);

            const productStats = useMemo(() => {
                const stats = {};
                records.forEach(r => {
                    if (r.recordType === 'invoice' && r.items) {
                         r.items.forEach(item => {
                             const name = item.name.trim();
                             if(!name) return;
                             if (!stats[name]) {
                                 stats[name] = {
                                     name: name,
                                     totalQty: 0,
                                     totalAmount: 0,
                                     lastDate: r.date,
                                     count: 0,
                                     partners: new Set()
                                 };
                             }
                             const qty = parseFloat(item.qty) || 0;
                             const price = parseFloat(item.price) || 0;
                             stats[name].totalQty += qty;
                             stats[name].totalAmount += (qty * price);
                             stats[name].count += 1;
                             
                             if (new Date(r.date) > new Date(stats[name].lastDate)) {
                                 stats[name].lastDate = r.date;
                             }
                             if (r.partyName) {
                                 stats[name].partners.add(r.partyName);
                             }
                         });
                    }
                });
                return Object.values(stats)
                    .filter(p => p.name.toLowerCase().includes(productSearch.toLowerCase()))
                    .sort((a, b) => b.totalAmount - a.totalAmount); 
            }, [records, productSearch]);

            // --- Handlers ---
            const showNotify = (msg, type = 'success') => {
                setNotification({ msg, type });
                setTimeout(() => setNotification(null), 3000);
            };

            const resetForms = () => {
                setEditingId(null);
                setIsLocked(true); // Reset lock state
                setInvoiceForm({
                    recordType: 'invoice', type: 'sales', format: 'triplicate', invoiceNumber: '',
                    date: formatDate(new Date()), invoicePeriod: getCurrentMonth(), partyName: '', partyId: '', amountType: 'inclusive', note: '', isStoreTransaction: false,
                    items: [{ id: Date.now(), name: '', qty: 1, price: '' }],
                    payments: [], // v2.17 Reset payments
                    orderDate: '', deliveryDate: '', paymentDueDate: '', sourceMonthlyId: null
                });
                setGeneralForm({
                    recordType: 'general', type: 'income', date: formatDate(new Date()), title: '', totalAmount: '', note: ''
                });
                setMonthlyForm({
                     recordType: 'monthly_entry', type: 'purchase', date: formatDate(new Date()), supplierName: '', amount: '', paymentTerms: '30', dueDate: addDays(new Date(), 30), note: ''
                });
            };

            const fillPartner = (partner) => {
                setInvoiceForm(prev => ({
                    ...prev,
                    partyName: partner.name,
                    partyId: partner.id
                }));
                setInvoicePartnerSearch('');
                setShowPartnerSuggestions(false);
                showNotify(`已帶入客戶：${partner.name}`);
            };

            const handleAutoNextNumber = () => {
                if (invoiceForm.type !== 'sales') {
                    showNotify('自動取號功能僅適用於「銷項」(開立) 發票', 'error');
                    return;
                }

                const currentFormat = invoiceForm.format;
                const relevantLast = currentFormat === 'triplicate' ? lastInvoiceStats.lastTriplicate : lastInvoiceStats.lastDuplicate;

                if (!relevantLast || !relevantLast.invoiceNumber) {
                    showNotify('尚無此類別的歷史「銷項」發票可參考', 'error');
                    return;
                }

                const lastNum = relevantLast.invoiceNumber;
                const match = lastNum.match(/^([A-Za-z]*)([0-9]+)$/);
                
                if (match) {
                    const prefix = match[1];
                    const numStr = match[2];
                    const numLen = numStr.length;
                    const nextNumVal = parseInt(numStr, 10) + 1;
                    const nextNumStr = nextNumVal.toString().padStart(numLen, '0');
                    const newInvoiceNum = prefix + nextNumStr;
                    setInvoiceForm(prev => ({ ...prev, invoiceNumber: newInvoiceNum }));
                    showNotify(`已自動帶入號碼: ${newInvoiceNum}`);
                } else {
                     showNotify('無法解析上一筆號碼格式，請手動輸入', 'error');
                }
            };

            const handleInvoiceChange = (e) => {
                const { name, value, type, checked } = e.target;
                setInvoiceForm(prev => ({ ...prev, [name]: type === 'checkbox' ? checked : value }));
            };
            
            // v2.17 Payment Handlers
            const handlePaymentAdd = () => {
                if (!newPayment.amount || isNaN(newPayment.amount)) return showNotify('請輸入有效金額', 'error');
                setInvoiceForm(prev => ({
                    ...prev,
                    payments: [...prev.payments, { ...newPayment, id: Date.now() }]
                }));
                setNewPayment({ date: formatDate(new Date()), method: '現金', amount: '', note: '' }); // Reset input
            };

            const handlePaymentRemove = (pid) => {
                setInvoiceForm(prev => ({
                    ...prev,
                    payments: prev.payments.filter(p => p.id !== pid)
                }));
            };
            
            const handleMonthlyChange = (e) => {
                 const { name, value } = e.target;
                 setMonthlyForm(prev => ({ ...prev, [name]: value }));
            };

            const handleItemChange = (id, field, value) => {
                setInvoiceForm(prev => ({
                    ...prev,
                    items: prev.items.map(item => item.id === id ? { ...item, [field]: value } : item)
                }));
            };

            const addPresetItem = (preset) => {
                const newItem = { 
                    id: Date.now(), 
                    name: preset.name, 
                    qty: 1, 
                    price: preset.price 
                };
                setInvoiceForm(prev => {
                    const items = [...prev.items];
                    const lastItem = items[items.length - 1];
                    if (items.length === 1 && !lastItem.name && !lastItem.price) {
                        return { ...prev, items: [newItem] };
                    } else {
                        return { ...prev, items: [...items, newItem] };
                    }
                });
            };

            const handleGeneralChange = (e) => {
                const { name, value } = e.target;
                setGeneralForm(prev => ({ ...prev, [name]: value }));
            };

            const updatePreset = (index, field, value) => {
                const newPresets = [...productPresets];
                newPresets[index] = { ...newPresets[index], [field]: value };
                setProductPresets(newPresets);
            };

            const startEdit = (record) => {
                setEditingId(record.id);
                setIsLocked(true); // Default to locked when starting edit
                if (record.recordType === 'invoice') {
                    setInvoiceForm({
                        ...record,
                        invoicePeriod: record.invoicePeriod || (record.date || '').slice(0,7),
                        items: record.items || [{ id: Date.now(), name: record.title || '', qty: 1, price: record.totalAmount }],
                        payments: Array.isArray(record.payments) ? record.payments : [], // Ensure Array
                        orderDate: record.orderDate || '',
                        deliveryDate: record.deliveryDate || '',
                        paymentDueDate: record.paymentDueDate || ''
                    });
                    setActiveTab('invoice_entry');
                } else if (record.recordType === 'monthly_entry') {
                    setMonthlyForm({ ...record });
                    setActiveTab('monthly');
                } else {
                    setGeneralForm({ ...record });
                    setActiveTab('general_entry');
                }
                showNotify('已載入資料，修改完成後請按儲存', 'success');
            };

            const convertMonthlyToInvoice = (monthlyRecord) => {
                if(!confirm(`確定要將「${monthlyRecord.supplierName}」的暫估資料轉為正式發票？\n系統將自動帶入金額與日期資料。`)) return;
                
                const isSales = monthlyRecord.type === 'sales';
                
                resetForms();
                setInvoiceForm(prev => ({
                    ...prev,
                    type: isSales ? 'sales' : 'purchase', 
                    partyName: monthlyRecord.supplierName,
                    date: monthlyRecord.date, 
                    deliveryDate: monthlyRecord.date,
                    paymentDueDate: monthlyRecord.dueDate,
                    items: [{ id: Date.now(), name: monthlyRecord.note || (isSales ? '銷貨貨款' : '進貨貨款'), qty: 1, price: monthlyRecord.amount }],
                    amountType: 'inclusive', 
                    sourceMonthlyId: monthlyRecord.id 
                }));
                setActiveTab('invoice_entry');
                showNotify('資料已帶入，請補上「發票號碼」後儲存。', 'success');
            };

            const submitInvoice = (e) => {
                e.preventDefault();
                if (!invoiceForm.invoiceNumber) return showNotify('請輸入發票號碼', 'error');
                
                if (!editingId || (editingId && records.find(r => r.id === editingId).invoiceNumber !== invoiceForm.invoiceNumber)) {
                    if (records.some(r => r.id !== editingId && r.recordType === 'invoice' && r.invoiceNumber === invoiceForm.invoiceNumber && r.type === invoiceForm.type)) {
                        return showNotify('發票號碼重複', 'error');
                    }
                }
                
                const newId = Date.now().toString();
                const now = new Date().toISOString();

                // Remove legacy payment fields from the saved record to clean up data
                const { paymentStatus, depositAmount, ...cleanForm } = invoiceForm;

                const recordData = {
                    ...cleanForm,
                    ...invoiceCalculated,
                    updatedAt: now
                };

                if (recordData.sourceMonthlyId) {
                    delete recordData.sourceMonthlyId;
                }

                if (editingId) {
                    setRecords(prev => prev.map(r => r.id === editingId ? { ...recordData, id: editingId, createdAt: r.createdAt } : r));
                    showNotify('發票修改成功');
                    setEditingId(null);
                } else {
                    setRecords(prev => {
                        const newRecord = { ...recordData, id: newId, createdAt: now };
                        let updatedList = [newRecord, ...prev];
                        if (invoiceForm.sourceMonthlyId) {
                            updatedList = updatedList.filter(r => r.id !== invoiceForm.sourceMonthlyId);
                        }
                        return updatedList;
                    });
                    showNotify('發票開立成功');
                }
                
                resetForms();
            };
            
            const submitMonthlyEntry = (e) => {
                e.preventDefault();
                if(!monthlyForm.supplierName || !monthlyForm.amount) return showNotify('請填寫完整資訊', 'error');
                
                const recordData = {
                    ...monthlyForm,
                    updatedAt: new Date().toISOString()
                };
                
                 if (editingId) {
                    setRecords(prev => prev.map(r => r.id === editingId ? { ...recordData, id: editingId, createdAt: r.createdAt } : r));
                    showNotify('月結紀錄修改成功');
                    setEditingId(null);
                } else {
                    setRecords(prev => [{ ...recordData, id: Date.now().toString(), createdAt: new Date().toISOString() }, ...prev]);
                    showNotify('月結紀錄新增成功');
                }
                setMonthlyForm(prev => ({
                     recordType: 'monthly_entry', type: prev.type, date: formatDate(new Date()), supplierName: '', amount: '', paymentTerms: '30', dueDate: addDays(new Date(), 30), note: ''
                }));
            };

            const submitGeneral = (e) => {
                e.preventDefault();
                if (!generalForm.title || !generalForm.totalAmount) return showNotify('請填寫完整資訊', 'error');
                
                const recordData = {
                    ...generalForm,
                    salesAmount: 0, taxAmount: 0,
                    totalAmount: Math.round(parseInt(generalForm.totalAmount)),
                    depositAmount: Math.round(parseFloat(generalForm.depositAmount || 0)),
                    overpaymentAmount: Math.round(parseFloat(generalForm.overpaymentAmount || 0)),
                    updatedAt: new Date().toISOString()
                };

                if (editingId) {
                    setRecords(prev => prev.map(r => r.id === editingId ? { ...recordData, id: editingId, createdAt: r.createdAt } : r));
                    showNotify('收支修改成功');
                    setEditingId(null);
                } else {
                    setRecords(prev => [{ ...recordData, id: Date.now().toString(), createdAt: new Date().toISOString() }, ...prev]);
                    showNotify('收支紀錄成功');
                }
                setGeneralForm(prev => ({ ...prev, title: '', totalAmount: '', note: '' }));
            };

            const deleteRecord = (id) => {
                if (confirm('確定刪除此紀錄？')) {
                    setRecords(prev => prev.filter(r => r.id !== id));
                    if (editingId === id) resetForms(); 
                    showNotify('已刪除');
                }
            };

            const copyToClipboard = (text) => {
                if (!text) return;
                const textArea = document.createElement("textarea");
                textArea.value = text;
                document.body.appendChild(textArea);
                textArea.select();
                try {
                    document.execCommand('copy');
                    showNotify(`已複製: ${text}`);
                } catch (err) {
                    showNotify('複製失敗', 'error');
                }
                document.body.removeChild(textArea);
            };

            // --- Export Functions ---
            const exportARAP = (type) => {
                if (!window.XLSX) return showNotify("Excel 元件載入失敗", "error");
                
                const isAR = type === 'ar';
                const dataList = isAR ? unpaidStats.receivables : unpaidStats.payables;
                const title = isAR ? '應收帳款報表(AR)' : '應付帳款報表(AP)';
                const fileName = `個人工作室_${isAR ? '應收' : '應付'}_${new Date().toISOString().slice(0,10)}.xlsx`;

                const exportData = dataList.map(r => {
                    const paidAmount = r.payments ? r.payments.reduce((s,p)=>s+(parseFloat(p.amount)||0),0) : 0;
                    return {
                        "類別": r.isEstimated ? '月結暫估(未開發票)' : '正式發票',
                        "發票/日期": r.date,
                        "到期日": r.paymentDueDate || '未設定',
                        "對象名稱": r.partyName || r.supplierName, 
                        "統一編號": r.partyId || '',
                        "發票號碼": r.invoiceNumber || '',
                        "總金額": r.totalAmount || r.amount,
                        "已付金額": paidAmount,
                        "未付餘額": r.remaining,
                        "備註": r.note
                    };
                });

                const wb = XLSX.utils.book_new();
                const ws = XLSX.utils.json_to_sheet([]);
                XLSX.utils.sheet_add_aoa(ws, [
                    [title, `匯出時間: ${new Date().toLocaleString()}`],
                    [`總筆數: ${dataList.length}`, `總未付金額: ${isAR ? unpaidStats.totalReceivable : unpaidStats.totalPayable}`],
                    [""]
                ], { origin: "A1" });

                XLSX.utils.sheet_add_json(ws, exportData, { origin: "A4" });
                XLSX.utils.book_append_sheet(wb, ws, "未結帳款");
                XLSX.writeFile(wb, fileName);
                showNotify(`${title} 匯出成功`);
            };

            const exportToExcel = () => {
                if (!window.XLSX) {
                    return showNotify("Excel 元件載入失敗，請檢查網路連線", "error");
                }

                // Helper to format payments for Excel
                const getPaymentDetails = (record) => {
                    if (!record.payments || record.payments.length === 0) return '未付款';
                    const details = record.payments.map(p => `${p.date} [${p.method}] $${p.amount}`).join('; ');
                    const totalPaid = record.payments.reduce((s,p)=>s+(parseFloat(p.amount)||0),0);
                    const remaining = (record.totalAmount || 0) - totalPaid;
                    if (remaining <= 0) return `已付清 (${details})`;
                    return `部分付: $${totalPaid} (餘 $${remaining}) - 詳細: ${details}`;
                };

                // If user selected a specific invoice period, limit exported invoices to that period
                const exportRecords = filterInvoicePeriod ? records.filter(r => r.recordType !== 'invoice' || ((r.invoicePeriod || (r.date||'').slice(0,7)) === filterInvoicePeriod)) : records;

                // 1. Accountant Data (Sheet 1)
                const accountantData = exportRecords
                    .filter(r => r.recordType === 'invoice')
                    .sort((a, b) => new Date(a.date) - new Date(b.date))
                    .map(r => ({
                        "日期": r.date,
                        "類別": r.format === 'triplicate' ? '三聯式' : '二聯式',
                        "進銷項": r.type === 'sales' ? '銷項' : '進項',
                        "發票號碼": r.invoiceNumber,
                        "統一編號": r.partyId,
                        "對象名稱": r.partyName,
                        "品項明細": r.items && r.items.length > 0 ? r.items.map(i => `${i.name} x${i.qty} @${i.price} = ${Math.round((parseFloat(i.qty)||0)*(parseFloat(i.price)||0))}`).join('; ') : '',
                        "銷售額(未稅)": r.salesAmount,
                        "稅額": r.taxAmount,
                        "總金額(含稅)": r.totalAmount,
                        "是否門市帳": r.isStoreTransaction ? '是' : '否',
                        "付款詳情": getPaymentDetails(r), // v2.17 New Column
                        "預計收付日": r.paymentDueDate || '',
                        "訂貨日": r.orderDate || '',
                        "收貨日": r.deliveryDate || '',
                        "備註": r.note
                    }));

                // 2. Manager Data (Sheet 2)
                let totalIncome = 0;
                let totalExpense = 0;

                const managerData = exportRecords

                                            <li><span className="font-bold text-gray-800">編輯安全鎖：</span> 編輯既有發票時，「發票號碼」與「日期」預設為鎖定狀態，防止誤改。需點擊標題旁的「🔓 解鎖」按鈕才能修改。</li>
                                            <li><span className="font-bold text-gray-800">舊資料升級：</span> 舊版本的付款狀態會自動轉換為新的付款紀錄格式，無需手動調整。</li>
                                        </ul>
                                    </section>
                                    <section>
                                        <h3 className="text-lg font-bold text-blue-700 border-b border-blue-100 pb-2 mb-3">v2.16 自動取號邏輯</h3>
                                        <ul className="list-disc list-inside space-y-2 text-gray-600 text-sm leading-relaxed">
                                            <li><span className="font-bold text-gray-800">自動取號：</span> 發票號碼旁的「+1 接續」按鈕，現在僅在選擇「銷項(開立)」時才會出現。</li>
                                            <li><span className="font-bold text-gray-800">邏輯鎖定：</span> 點擊自動取號時，系統會強制接續上一張「銷項」的二聯或三聯發票號碼，不會受進項發票影響。</li>
                                        </ul>
                                    </section>
                                </div>
                            </div>
                        )}
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<InvoiceSystem />);
    </script>
</body>
</html>
