<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>門市發票與收支管理系統 v2.3</title>
    <script>
        // Preserving existing functionality
        let isReceipt = false; // Variable to keep track of invoice type (normal or receipt)
        let filterStartMonth = ''; // Variable for filter start month
        let filterEndMonth = ''; // Variable for filter end month

        function updateTaxes(invoice) {
            // Update tax logic based on invoice type
            if (invoice.isReceipt) {
                invoice.taxAmount = 0; // Set taxAmount to 0 if it's a receipt
            }
        }

        function exportFilteredToExcel() {
            // Logic to export only records that match current filters
            let filteredData = records.filter(record => {
                return record.date >= filterStartMonth && record.date <= filterEndMonth;
            });
            // Assuming a function to handle Excel export
            exportToExcel(filteredData);
        }

        function updateMonthlyStats() {
            // Update monthly stats based on the filtered date range
            let stats = calculateStats(records.filter(record => {
                return record.date >= filterStartMonth && record.date <= filterEndMonth;
            }));
            displayStats(stats);
        }
    </script>
</head>
<body>
    <h1>門市發票與收支管理系統</h1>
    <div id="list-tab">
        <button onclick="exportFilteredToExcel()">按篩選結果匯出 Excel</button>
        
        <!-- Removed the filterInvoicePeriod dropdown here -->
        
        <div>
            <label for="invoiceType">發票類型:</label>
            <select id="invoiceType" onchange="isReceipt = this.value === 'receipt';">
                <option value="normal">普通發票</option>
                <option value="receipt">收據</option>
            </select>
        </div>
        
        <div>
            <label for="filterStartMonth">開始日期:</label>
            <input type="date" id="filterStartMonth" onchange="filterStartMonth = this.value; updateMonthlyStats()">
        </div>
        <div>
            <label for="filterEndMonth">結束日期:</label>
            <input type="date" id="filterEndMonth" onchange="filterEndMonth = this.value; updateMonthlyStats()">
        </div>
        
        <!-- Other UI components can remain intact -->
    </div>
</body>
</html>
